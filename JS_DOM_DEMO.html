<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DEMO for DOM operartions </title>
</head>
<body>

    <h2> here is the data rendered via MOCK API </h2>
    <!-- JS DOM implemetation steps  -->

    <!-- 
we will be using MOCK API for rendering data 
Step1 : Creating a basic HTML structure with a container to hold the data 
Step 2: Fetching data from API using fetch method
Step 3: Manipulating the DOM to display the fetched data


     -->

     <script>
         // Step 1: Create a basic HTML structure with a container to hold the data
         const container = document.createElement('div');
         container.id = 'data-container';
         document.body.appendChild(container);

         // Step 2: Fetch data from API using fetch method
         fetch('https://jsonplaceholder.typicode.com/posts')
             .then(response => response.json())
             .then(data => {
                 // Step 3: Manipulating the DOM to display the fetched data
                 data.forEach(post => {
                     const postElement = document.createElement('div');
                     postElement.innerHTML = `<h3>${post.title}</h3><p>${post.body}</p>`;
                     container.appendChild(postElement);
                 });
             })
             .catch(error => {
                 console.error('Error fetching data:', error);
             });
     


     </script>





</body>
</html>
